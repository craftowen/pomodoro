name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - name: Extract version from tag
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_ENV"

      - name: Build release
        run: |
          swift build -c release 2>&1

          APP_BUNDLE=".build/release/Pomodoro.app"
          APP_DIR="$APP_BUNDLE/Contents"
          rm -rf "$APP_BUNDLE"
          mkdir -p "$APP_DIR/MacOS"
          mkdir -p "$APP_DIR/Resources"
          mkdir -p "$APP_DIR/Frameworks"

          cp .build/release/Pomodoro "$APP_DIR/MacOS/Pomodoro"
          cp Pomodoro/Info.plist "$APP_DIR/Info.plist"
          cp Pomodoro/Resources/AppIcon.icns "$APP_DIR/Resources/AppIcon.icns"

          # Copy localized strings
          BUNDLE_DIR=$(find .build -path "*/release/Pomodoro_Pomodoro.bundle" -type d 2>/dev/null | head -1)
          if [ -n "$BUNDLE_DIR" ]; then
              for lproj in "$BUNDLE_DIR"/*.lproj; do
                  cp -R "$lproj" "$APP_DIR/Resources/"
              done
          fi

          # Embed Sparkle.framework
          SPARKLE_FW=$(find .build/artifacts -name "Sparkle.framework" -path "*/macos*" -type d 2>/dev/null | head -1)
          if [ -n "$SPARKLE_FW" ]; then
              cp -R "$SPARKLE_FW" "$APP_DIR/Frameworks/"
              install_name_tool -add_rpath @executable_path/../Frameworks "$APP_DIR/MacOS/Pomodoro" 2>/dev/null || true
          else
              echo "Warning: Sparkle.framework not found. Auto-update will not work."
          fi

          /usr/libexec/PlistBuddy -c "Delete :CFBundleIdentifier" "$APP_DIR/Info.plist" 2>/dev/null || true
          /usr/libexec/PlistBuddy -c "Add :CFBundleIdentifier string com.pomodoro.app" "$APP_DIR/Info.plist"
          /usr/libexec/PlistBuddy -c "Delete :CFBundleName" "$APP_DIR/Info.plist" 2>/dev/null || true
          /usr/libexec/PlistBuddy -c "Add :CFBundleName string Pomodoro" "$APP_DIR/Info.plist"
          /usr/libexec/PlistBuddy -c "Delete :CFBundlePackageType" "$APP_DIR/Info.plist" 2>/dev/null || true
          /usr/libexec/PlistBuddy -c "Add :CFBundlePackageType string APPL" "$APP_DIR/Info.plist"
          /usr/libexec/PlistBuddy -c "Delete :NSPrincipalClass" "$APP_DIR/Info.plist" 2>/dev/null || true
          /usr/libexec/PlistBuddy -c "Add :NSPrincipalClass string NSApplication" "$APP_DIR/Info.plist"
          /usr/libexec/PlistBuddy -c "Delete :CFBundleShortVersionString" "$APP_DIR/Info.plist" 2>/dev/null || true
          /usr/libexec/PlistBuddy -c "Add :CFBundleShortVersionString string $VERSION" "$APP_DIR/Info.plist"

          # Ad-hoc sign embedded frameworks first, then the app
          codesign --force --sign - "$APP_DIR/Frameworks/Sparkle.framework" 2>/dev/null || true
          codesign --force --sign - --entitlements Pomodoro/Pomodoro.entitlements .build/release/Pomodoro.app

      - name: Create zip
        run: |
          cd .build/release
          zip -r Pomodoro.app.zip Pomodoro.app

      - name: Compute SHA256
        run: |
          SHA=$(shasum -a 256 .build/release/Pomodoro.app.zip | awk '{print $1}')
          echo "SHA256=$SHA" >> "$GITHUB_ENV"

      - name: Sign with EdDSA for Sparkle
        run: |
          curl -sL -o /tmp/Sparkle.tar.xz https://github.com/sparkle-project/Sparkle/releases/download/2.9.1/Sparkle-2.9.1.tar.xz
          mkdir -p /tmp/sparkle-tools
          tar xf /tmp/Sparkle.tar.xz -C /tmp/sparkle-tools

          echo "${{ secrets.SPARKLE_PRIVATE_KEY }}" > /tmp/sparkle_key

          SIGN_OUTPUT=$(/tmp/sparkle-tools/bin/sign_update .build/release/Pomodoro.app.zip -f /tmp/sparkle_key)
          rm -f /tmp/sparkle_key

          ED_SIGNATURE=$(echo "$SIGN_OUTPUT" | grep -o 'edSignature="[^"]*"' | cut -d'"' -f2)
          FILE_LENGTH=$(wc -c < .build/release/Pomodoro.app.zip | tr -d ' ')

          echo "ED_SIGNATURE=$ED_SIGNATURE" >> "$GITHUB_ENV"
          echo "FILE_LENGTH=$FILE_LENGTH" >> "$GITHUB_ENV"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: .build/release/Pomodoro.app.zip
          generate_release_notes: true

      - name: Update appcast.xml
        run: scripts/update-appcast.sh "$VERSION" "$ED_SIGNATURE" "$FILE_LENGTH"

      - name: Update Cask formula
        run: scripts/update-cask.sh "$VERSION" "$SHA256"

      - name: Commit updated Cask and appcast
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Casks/pomodoro.rb appcast.xml
          git diff --cached --quiet && exit 0
          git commit -m "chore: update Homebrew Cask and appcast to v${VERSION}"
          git push
